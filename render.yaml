databases:
  - name: sknomina-postgres
    databaseName: sknomina
    user: sknomina_app
    plan: starter

services:
  - type: web
    name: sknomina-api
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate && npm run seed:admins
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sknomina-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_NAMES
        value: Super
      - key: SUPERADMIN_LAST_NAMES
        value: Admin
      - key: FRONTEND_URL
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: PAYPHONE_API_BASE
        value: https://pay.payphonetodoesposible.com
      - key: PAYPHONE_TOKEN
        sync: false
      - key: PAYPHONE_STORE_ID
        sync: false
      - key: PAYPHONE_WEBHOOK_SECRET
        sync: false
      - key: PAYPHONE_TIMEOUT_MS
        value: "12000"
      - key: PAYMENT_PROVIDER
        value: payphone
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_ENABLED
        sync: false
      - key: COMMUNICATION_PROVIDER
        value: smtp
      - key: COMMUNICATION_DEV_MODE
        value: "false"
      - key: COMMUNICATION_REQUIRE_REAL_PROVIDER
        value: "true"
      - key: COMMUNICATION_RETENTION_DAYS
        value: "365"
      - key: COMMUNICATION_EVENT_HASH_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_AUTH_REQUIRED
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: WHATSAPP_ENABLED
        sync: false
      - key: WHATSAPP_API_BASE_URL
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        sync: false
      - key: WHATSAPP_TEMPLATE_EMPLOYEE_INVITE
        sync: false
      - key: WHATSAPP_TEMPLATE_PASSWORD_RESET
        sync: false
      - key: WHATSAPP_TEMPLATE_EMAIL_VERIFICATION
        sync: false
      - key: WHATSAPP_TEMPLATE_SYSTEM_TEST
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: worker
    name: sknomina-worker-cron
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate
    startCommand: npm run cron:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sknomina-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: web
    name: sknomina-frontend
    env: static
    rootDir: frontend-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
