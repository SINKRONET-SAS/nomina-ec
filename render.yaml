databases:
  - name: sknomina-postgres
    databaseName: sknomina
    user: sknomina_app
    plan: basic-256mb

services:
  - type: web
    name: sknomina-api
    runtime: node
    domains:
      - api.sknomina.com
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate && npm run seed:admins
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.19.0"
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sknomina-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: EMPLOYEE_INVITE_SECRET
        generateValue: true
      - key: EMPLOYEE_APP_INVITE_TTL_DAYS
        value: "7"
      - key: BANK_ACCOUNT_ENCRYPTION_KEY
        sync: false
      - key: REQUIRE_VALIDATED_LEGAL_PARAMETERS
        value: "true"
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_NAMES
        value: Super
      - key: SUPERADMIN_LAST_NAMES
        value: Admin
      - key: OWNER_TENANT_RUC
        sync: false
      - key: OWNER_TENANT_RAZON_SOCIAL
        sync: false
      - key: OWNER_TENANT_NOMBRE_COMERCIAL
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: OWNER_NAMES
        sync: false
      - key: OWNER_LAST_NAMES
        sync: false
      - key: FRONTEND_URL
        value: https://sknomina.com
      - key: APP_PUBLIC_URL
        value: https://sknomina.com
      - key: BACKEND_PUBLIC_URL
        value: https://api.sknomina.com
      - key: MOBILE_APP_ACTIVATION_URL
        value: sknomina://employee/activate
      - key: PAYPHONE_API_BASE
        value: https://pay.payphonetodoesposible.com
      - key: PAYPHONE_TOKEN
        sync: false
      - key: PAYPHONE_STORE_ID
        sync: false
      - key: PAYPHONE_WEBHOOK_SECRET
        sync: false
      - key: PAYPHONE_TIMEOUT_MS
        value: "12000"
      - key: PAYMENT_PROVIDER
        value: payphone
      - key: COMMERCIAL_IVA_RATE
        value: "0.15"
      - key: PROVIDER_INVOICE_IVA_RATE
        value: "0.15"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SINKRONET_FACTURADOR_BASE_URL
        sync: false
      - key: SINKRONET_FACTURADOR_API_KEY
        sync: false
      - key: SINKRONET_FACTURADOR_INVOICE_PATH
        value: /api/facturas
      - key: SINKRONET_FACTURADOR_HEALTH_PATH
        value: /api/health
      - key: SINKRONET_FACTURADOR_WEBHOOK_SECRET
        sync: false
      - key: SINKRONET_FACTURADOR_TIMEOUT_MS
        value: "15000"
      - key: SMTP_ENABLED
        sync: false
      - key: COMMUNICATION_PROVIDER
        value: smtp
      - key: COMMUNICATION_DEV_MODE
        value: "false"
      - key: COMMUNICATION_REQUIRE_REAL_PROVIDER
        value: "true"
      - key: COMMUNICATION_RETENTION_DAYS
        value: "365"
      - key: COMMUNICATION_EVENT_HASH_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_AUTH_REQUIRED
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: WHATSAPP_ENABLED
        sync: false
      - key: WHATSAPP_API_BASE_URL
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        sync: false
      - key: WHATSAPP_TEMPLATE_EMPLOYEE_INVITE
        sync: false
      - key: WHATSAPP_TEMPLATE_PASSWORD_RESET
        sync: false
      - key: WHATSAPP_TEMPLATE_EMAIL_VERIFICATION
        sync: false
      - key: WHATSAPP_TEMPLATE_SYSTEM_TEST
        sync: false
      - key: STORAGE_DRIVER
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: worker
    name: sknomina-worker-cron
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate
    startCommand: npm run cron:start
    envVars:
      - key: NODE_VERSION
        value: "22.19.0"
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sknomina-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: sknomina-api
          envVarKey: JWT_SECRET
      - key: BANK_ACCOUNT_ENCRYPTION_KEY
        fromService:
          type: web
          name: sknomina-api
          envVarKey: BANK_ACCOUNT_ENCRYPTION_KEY
      - key: REQUIRE_VALIDATED_LEGAL_PARAMETERS
        value: "true"
      - key: STORAGE_DRIVER
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: web
    name: sknomina-frontend
    runtime: static
    domains:
      - sknomina.com
    rootDir: frontend-web
    buildCommand: npm ci --include=optional && npm install @rollup/rollup-linux-x64-gnu@4.61.1 --no-save --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22.19.0"
      - key: VITE_API_URL
        value: https://api.sknomina.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
