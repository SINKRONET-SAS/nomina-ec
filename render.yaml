databases:
  - name: haiky-postgres
    databaseName: plan_haiky
    user: haiky_migration
    plan: starter

services:
  - type: web
    name: haiky-api
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: haiky-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: worker
    name: haiky-worker-cron
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run db:migrate
    startCommand: npm run cron:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: haiky-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: web
    name: haiky-frontend
    env: static
    rootDir: frontend-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
