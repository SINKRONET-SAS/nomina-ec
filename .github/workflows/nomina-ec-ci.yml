name: Nomina-Ec CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nomina_ec_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nomina_ec_ci?schema=public
      DB_SSL: "false"
      JWT_SECRET: ci-secret
      BANK_ACCOUNT_ENCRYPTION_KEY: ci-bank-key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefix backend
      - run: npm --prefix backend run prisma:validate
      - run: npm --prefix backend run db:migrate
      - run: npm --prefix backend test -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - run: npm ci --prefix frontend-web
      - run: npm --prefix frontend-web run build
