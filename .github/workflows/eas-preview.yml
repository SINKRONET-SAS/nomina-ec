name: EAS Preview APK

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma
        required: true
        default: android
        type: choice
        options:
          - android
          - ios

jobs:
  build:
    name: EAS Build Preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        working-directory: app-movil
        run: eas build --profile preview --platform ${{ inputs.platform }} --non-interactive
