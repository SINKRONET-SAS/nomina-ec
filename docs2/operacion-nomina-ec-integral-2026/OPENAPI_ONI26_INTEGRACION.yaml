openapi: 3.0.3
info:
  title: Nomina-Ec API de Integracion
  version: v1
  description: Contrato preliminar ONI26 para integraciones con datos DEMO y seguridad obligatoria antes de exposicion.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /employees:
    get:
      summary: Lista empleados del tenant autenticado
      operationId: listEmployees
      parameters:
        - name: X-Correlation-Id
          in: header
          required: true
          schema:
            type: string
        - name: departmentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lista tabular sin datos sensibles innecesarios
        "401":
          description: Credencial invalida o expirada
        "403":
          description: Scope insuficiente
  /attendance/marks:
    post:
      summary: Registra marcacion de asistencia desde sistema externo
      operationId: createAttendanceMark
      parameters:
        - name: X-Correlation-Id
          in: header
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - employeeExternalId
                - markedAt
                - source
              properties:
                employeeExternalId:
                  type: string
                  example: DEMO-EMP-001
                markedAt:
                  type: string
                  format: date-time
                source:
                  type: string
                  enum:
                    - external_system
                    - mobile_app
      responses:
        "202":
          description: Marcacion aceptada para validacion
        "409":
          description: Solicitud duplicada por idempotencia
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
